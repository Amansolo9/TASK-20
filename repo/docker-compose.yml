services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: campus_admin
      POSTGRES_PASSWORD: campus_secret
      POSTGRES_DB: campus_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_admin -d campus_portal"]
      interval: 3s
      timeout: 3s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: campus_admin
      DB_PASSWORD: campus_secret
      DB_NAME: campus_portal
      DB_SSLMODE: disable
      SERVER_PORT: "8080"
      # SESSION_KEY and HMAC_SECRET are auto-generated at startup if not set (with a warning).
      # FIELD_ENCRYPTION_KEY is REQUIRED — data encrypted with one key cannot be read with another.
      # For production, create a .env file from .env.example with unique values.
      SESSION_KEY: ${SESSION_KEY-}
      HMAC_SECRET: ${HMAC_SECRET-}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY-}
      UPLOAD_DIR: /app/uploads
      WATCHED_DIR: /app/watched_folder
      # GIN_MODE defaults to debug. Set to "release" for production AFTER setting
      # FIELD_ENCRYPTION_KEY, SESSION_KEY, and HMAC_SECRET in .env.
      GIN_MODE: ${GIN_MODE:-debug}
    volumes:
      - uploads:/app/uploads
      - watched:/app/watched_folder
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  watched:
